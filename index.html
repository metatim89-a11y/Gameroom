    <div class="activity-feed glass-panel" id="activity-feed">
        <h4>Network Activity</h4>
        <!-- Feed entries -->
    </div>

    <script>
        function toggleMenu() {
            const overlay = document.getElementById('hud-overlay');
            const trigger = document.getElementById('menu-trigger');
            overlay.classList.toggle('active');
            trigger.classList.toggle('active');
        }

        function changeTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('refinery-theme', theme);
        }

        // 3D Cover Flow Logic
        const flow = document.getElementById('game-flow');
        const items = document.querySelectorAll('.flow-item');
        
        flow.onscroll = () => {
            const centerX = flow.scrollLeft + (flow.offsetWidth / 2);
            items.forEach(item => {
                const itemX = item.offsetLeft + (item.offsetWidth / 2);
                const distance = Math.abs(centerX - itemX);
                if (distance < 150) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        };

        // Activity Feed Simulation
        const feed = document.getElementById('activity-feed');
        const events = [
            "User '{user}' extracted {amt} SCRAP in {game}.",
            "Security breach bypassed by '{user}' in Core Systems.",
            "Global Treasury payout of {amt} detected.",
            "High-fidelity sync complete for '{user}'.",
            "Atmospheric recalibration successful."
        ];
        const names = ["NeonFox", "ZeroDay", "Ghost_Int", "Cipher8", "BitRunner", "Admin"];
        const games = ["Quantum Slots", "Blackjack Pro", "Win Wheel", "Deep Sea Fishing"];

        function addFeedEntry() {
            const user = names[Math.floor(Math.random()*names.length)];
            const game = games[Math.floor(Math.random()*games.length)];
            const amt = (Math.random()*500 + 10).toFixed(0);
            let template = events[Math.floor(Math.random()*events.length)];
            const text = template.replace('{user}', user).replace('{amt}', amt).replace('{game}', game);
            
            const entry = document.createElement('div');
            entry.className = 'feed-entry';
            entry.innerText = text;
            feed.appendChild(entry);
            
            if(feed.children.length > 6) feed.removeChild(feed.children[1]); // Keep title
        }
        setInterval(addFeedEntry, 4000);

        window.onload = () => {
            // Initial active item
            flow.scrollLeft = 1;
            flow.onscroll();

            const saved = localStorage.getItem('refinery-theme');
            if(saved) {
                document.getElementById('theme-selector').value = saved;
                changeTheme(saved);
            }
            
            const user = localStorage.getItem('session_user');
            const balance = localStorage.getItem('refinery_balance') || "1000.00";
            const authLinks = document.getElementById('auth-links');
            if(user) {
                authLinks.innerHTML = `
                    <div style="font-size:1.5rem; font-weight:900; color:var(--primary); margin-bottom:10px;">${user}</div>
                    <div style="font-family:'Space Mono'; color:var(--secondary); font-size:1.2rem; margin-bottom:30px;">$ ${parseFloat(balance).toFixed(2)}</div>
                    <button onclick="window.location.href='profile.html'" style="width:100%; margin-bottom:10px;">View Identity</button>
                    <button onclick="logout()" style="width:100%; background:transparent; border-color:var(--secondary); color:var(--secondary);">Terminate Session</button>
                `;
            } else {
                authLinks.innerHTML = `
                    <button onclick="window.location.href='login.html'" style="width:100%; margin-bottom:15px;">Authenticate</button>
                    <button onclick="window.location.href='signup.html'" style="width:100%; background:transparent; border-color:rgba(255,255,255,0.2);">Request Access</button>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('session_user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
