<!DOCTYPE html>
<html>
<head>
    <title>Quix Flow | Grand Olympus Casino</title>
    <link rel="stylesheet" href="../../../style.css">
    <style>
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 30px; }
        .node { 
            height: 90px; background: var(--surface-alt); border-radius: 16px; 
            border: 1px solid var(--border); display: flex; align-items: center; 
            justify-content: center; font-size: 1.5rem; font-weight: 900; 
            cursor: pointer; transition: all 0.3s ease;
            color: var(--text-dim); font-family: 'Space Mono', monospace;
        }
        .node.active { 
            border-color: var(--primary); background: var(--primary); 
            color: var(--bg); transform: scale(1.1); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 5;
        }
        .node:hover:not(.active) { border-color: var(--primary); background: var(--surface); }
        
        .level-badge { 
            font-size: 1rem; font-weight: 900; background: var(--surface); 
            color: var(--primary); padding: 8px 25px; border-radius: 30px; 
            border: 1px solid var(--border); display: inline-block;
            margin-bottom: 20px; letter-spacing: 3px;
        }
    </style>
</head>
<body id="game-body">
    <div class="container" style="text-align: center;">
        <div class="level-badge" id="score">LEVEL: 01</div>
        <div id="status" style="font-weight: 800; letter-spacing: 5px; color: var(--text); text-transform: uppercase;">DIVINE MEMORY</div>
        
        <div class="game-box">
            <div class="grid" id="node-grid"></div>
        </div>

        <div style="margin-top: 40px;">
            <button id="start-btn" onclick="startGame()" style="min-width: 250px;">BEGIN RITUAL</button>
        </div>
        <a href="../index.html" class="back-link">EXIT TO VAULT</a>
    </div>
    <script>
        let sequence = [], userSequence = [], level = 1, playing = false;
        function initGrid() {
            const grid = document.getElementById('node-grid');
            for(let i=0; i<16; i++) {
                grid.innerHTML += `<div class="node" id="n${i}" onclick="nodeClick(${i})">${(i+1).toString().padStart(2, '0')}</div>`;
            }
        }
        function startGame() {
            sequence = []; userSequence = []; level = 1; playing = true;
            document.getElementById('start-btn').style.display = 'none';
            nextLevel();
        }
        function nextLevel() {
            userSequence = [];
            sequence.push(Math.floor(Math.random() * 16));
            document.getElementById('score').innerText = "LEVEL: " + level.toString().padStart(2, '0');
            playSequence();
        }
        async function playSequence() {
            playing = false;
            document.getElementById('status').innerText = "WATCHING...";
            document.getElementById('status').style.color = "var(--primary)";
            await new Promise(r => setTimeout(r, 800));
            for(let id of sequence) {
                await flashNode(id);
                await new Promise(r => setTimeout(r, 200));
            }
            playing = true;
            document.getElementById('status').innerText = "YOUR TURN";
            document.getElementById('status').style.color = "var(--text)";
        }
        function flashNode(id) {
            return new Promise(r => {
                const el = document.getElementById('n'+id);
                el.classList.add('active');
                setTimeout(() => { el.classList.remove('active'); r(); }, 500);
            });
        }
        function nodeClick(id) {
            if(!playing) return;
            userSequence.push(id);
            const expected = sequence[userSequence.length-1];
            if(id !== expected) {
                document.getElementById('status').innerText = "RITUAL FAILED";
                document.getElementById('status').style.color = "var(--danger)";
                document.getElementById('start-btn').style.display = 'inline-block';
                document.getElementById('start-btn').innerText = "RE-ATTEMPT";
                playing = false;
            } else if(userSequence.length === sequence.length) {
                level++;
                document.getElementById('status').innerText = "DESCENDED";
                document.getElementById('status').style.color = "var(--primary)";
                setTimeout(nextLevel, 1000);
            }
        }
        initGrid();
        window.onload = () => {
            const t = localStorage.getItem('olympus-theme') || localStorage.getItem('refinery-theme');
            if(t) document.body.setAttribute('data-theme', t);
            else document.body.setAttribute('data-theme', 'classic');
        }
    </script>
</body>
</html>
