<!-- ./gameroom/games/Classic/asteroids/index.html v12.0 - Grand Olympus Casino Rebrand -->
<!DOCTYPE html>
<html>
<head>
    <title>Asteroids Core | Grand Olympus Casino</title>
    <link rel="stylesheet" href="../../../style.css">
    <style>
        .arcade-frame { 
            background: #000; border: 4px solid var(--primary); border-radius: 24px; 
            padding: 15px; display: inline-block; position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        canvas { background: #050508; border-radius: 12px; max-width: 90vw; height: auto; }
        .score-badge { 
            font-size: 1.2rem; font-weight: 900; background: var(--surface); 
            color: var(--primary); padding: 10px 30px; border-radius: 30px; 
            border: 1px solid var(--border); display: inline-block;
            margin-bottom: 20px; font-family: 'Space Mono', monospace;
        }
        .fire-btn { 
            width: 80px; height: 80px; border-radius: 50%; background: var(--primary); 
            color: #000; font-weight: 900; display: none; align-items: center; 
            justify-content: center; position: fixed; bottom: 30px; right: 30px; 
            z-index: 100; box-shadow: 0 10px 20px rgba(0,0,0,0.4); user-select: none; touch-action: manipulation;
        }
        @media (pointer: coarse) { .fire-btn { display: flex; } }
    </style>
</head>
<body id="game-body">
    <div class="container" style="text-align: center;">
        <div class="score-badge">SALVAGE_VALUE: <span id="score">000</span></div>
        <div class="arcade-frame">
            <canvas id="game" width="600" height="450"></canvas>
        </div>
        <div class="mobile-controls">
            <div class="d-btn" style="grid-area: up" ontouchstart="handleControl('ArrowUp', true)" ontouchend="handleControl('ArrowUp', false)" onmousedown="handleControl('ArrowUp', true)" onmouseup="handleControl('ArrowUp', false)">▲</div>
            <div class="d-btn" style="grid-area: left" ontouchstart="handleControl('ArrowLeft', true)" ontouchend="handleControl('ArrowLeft', false)" onmousedown="handleControl('ArrowLeft', true)" onmouseup="handleControl('ArrowLeft', false)">◀</div>
            <div class="d-btn" style="grid-area: right" ontouchstart="handleControl('ArrowRight', true)" ontouchend="handleControl('ArrowRight', false)" onmousedown="handleControl('ArrowRight', true)" onmouseup="handleControl('ArrowRight', false)">▶</div>
        </div>
        <div class="fire-btn" ontouchstart="fire()" onmousedown="fire()">FIRE</div>
        <div style="margin-top: 30px;">
            <p style="font-size: 0.7rem; color: var(--text-dim); letter-spacing: 2px;">ARROWS: NAVIGATE | SPACE: PULSE_CANNON</p>
        </div>
        <a href="../index.html" class="back-link">EXIT TO VAULT</a>
    </div>

<script>
const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
let score = 0;
let ship = { x:300, y:225, r:15, a:0, rot:0, thrust:false, vel:{x:0, y:0} };
let bullets = [], debris = [];

function fire() { bullets.push({x:ship.x, y:ship.y, vx:7*Math.cos(ship.a), vy:7*Math.sin(ship.a)}); }
function handleControl(key, active) {
    if(key=='ArrowUp') ship.thrust=active;
    if(key=='ArrowLeft') ship.rot=active?-0.08:0;
    if(key=='ArrowRight') ship.rot=active?0.08:0;
    if(key==' ' && active) fire();
}

function initDebris() {
    debris = [];
    for(let i=0; i<8; i++) {
        debris.push({ 
            x:Math.random()*canvas.width, y:Math.random()*canvas.height, 
            vx:Math.random()*2-1, vy:Math.random()*2-1, r:Math.random()*20+15,
            points: Math.floor(Math.random()*5+5)
        });
    }
}

function draw() {
    ctx.fillStyle = '#050508'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle = ship.thrust ? 'var(--primary)' : 'var(--text)'; ctx.lineWidth = 2; ctx.beginPath();
    ctx.moveTo(ship.x + ship.r * Math.cos(ship.a), ship.y + ship.r * Math.sin(ship.a));
    ctx.lineTo(ship.x - ship.r * (Math.cos(ship.a) - Math.sin(ship.a)), ship.y - ship.r * (Math.sin(ship.a) + Math.cos(ship.a)));
    ctx.lineTo(ship.x - ship.r * (Math.cos(ship.a) + Math.sin(ship.a)), ship.y - ship.r * (Math.sin(ship.a) - Math.cos(ship.a)));
    ctx.closePath(); ctx.stroke();
    ctx.fillStyle = 'var(--primary)';
    bullets.forEach((b, i) => { ctx.beginPath(); ctx.arc(b.x, b.y, 2, 0, Math.PI*2); ctx.fill(); b.x += b.vx; b.y += b.vy; if(b.x<0 || b.x>canvas.width || b.y<0 || b.y>canvas.height) bullets.splice(i, 1); });
    ctx.strokeStyle = 'var(--text-dim)';
    debris.forEach((d, i) => {
        ctx.beginPath(); for(let p=0; p<d.points; p++) { let angle = (p/d.points)*Math.PI*2; let rx = d.x + d.r * Math.cos(angle); let ry = d.y + d.r * Math.sin(angle); if(p===0) ctx.moveTo(rx, ry); else ctx.lineTo(rx, ry); }
        ctx.closePath(); ctx.stroke(); d.x += d.vx; d.y += d.vy; if(d.x<0) d.x=canvas.width; if(d.x>canvas.width) d.x=0; if(d.y<0) d.y=canvas.height; if(d.y>canvas.height) d.y=0;
        bullets.forEach((b, bi) => { if(Math.hypot(d.x-b.x, d.y-b.y) < d.r) { debris.splice(i, 1); bullets.splice(bi, 1); score += 10; document.getElementById('score').innerText = score.toString().padStart(3, '0'); if(debris.length < 5) debris.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, vx:Math.random()*3-1.5, vy:Math.random()*3-1.5, r:20, points:7}); } });
    });
    if(ship.thrust) { ship.vel.x += 0.15 * Math.cos(ship.a); ship.vel.y += 0.15 * Math.sin(ship.a); }
    ship.vel.x *= 0.99; ship.vel.y *= 0.99; ship.x += ship.vel.x; ship.y += ship.vel.y; ship.a += ship.rot;
    if(ship.x<0) ship.x=canvas.width; if(ship.x>canvas.width) ship.x=0; if(ship.y<0) ship.y=canvas.height; if(ship.y>canvas.height) ship.y=0;
    requestAnimationFrame(draw);
}

window.onkeydown = e => handleControl(e.key, true);
window.onkeyup = e => handleControl(e.key, false);
window.onload = () => {
    const t = localStorage.getItem('olympus-theme') || localStorage.getItem('refinery-theme');
    if(t) document.body.setAttribute('data-theme', t);
    else document.body.setAttribute('data-theme', 'classic');
    initDebris();
    draw();
}
</script></body></html>
