<!DOCTYPE html><html><head><title>DEBRIS DISPOSAL</title>
<style>
    body { background:#000; color:#00ff41; font-family:monospace; text-align:center; overflow:hidden; }
    canvas { border:2px solid #00ff41; background:#050505; }
</style></head><body>
    <h1>☄️ DEBRIS DISPOSAL</h1>
    <canvas id="game" width="400" height="400"></canvas>
    <div style="margin-top:10px;">[ ARROWS: Move | SPACE: Pulse ]</div>
    <a href="../index.html" style="display:block;margin-top:15px;color:#00ff41;">← BACK</a>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let ship = { x:200, y:200, r:15, a:0, rot:0, thrust:false, vel:{x:0, y:0} };
let bullets = [];
let debris = [];

// Create initial scraps
for(let i=0; i<5; i++) {
    debris.push({ x:Math.random()*400, y:Math.random()*400, vx:Math.random()*2-1, vy:Math.random()*2-1, r:20 });
}

function draw() {
    ctx.clearRect(0, 0, 400, 400);
    
    // Draw Ship
    ctx.strokeStyle = ship.thrust ? '#ff0000' : '#00ff41';
    ctx.beginPath();
    ctx.moveTo(ship.x + ship.r * Math.cos(ship.a), ship.y + ship.r * Math.sin(ship.a));
    ctx.lineTo(ship.x - ship.r * (Math.cos(ship.a) - Math.sin(ship.a)), ship.y - ship.r * (Math.sin(ship.a) + Math.cos(ship.a)));
    ctx.lineTo(ship.x - ship.r * (Math.cos(ship.a) + Math.sin(ship.a)), ship.y - ship.r * (Math.sin(ship.a) - Math.cos(ship.a)));
    ctx.closePath(); ctx.stroke();

    // Draw Bullets & Debris
    ctx.fillStyle = '#00ff41';
    bullets.forEach((b, i) => {
        ctx.fillRect(b.x, b.y, 2, 2);
        b.x += b.vx; b.y += b.vy;
        if(b.x<0 || b.x>400 || b.y<0 || b.y>400) bullets.splice(i, 1);
    });

    debris.forEach((d, i) => {
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.stroke();
        d.x += d.vx; d.y += d.vy;
        if(d.x<0) d.x=400; if(d.x>400) d.x=0; if(d.y<0) d.y=400; if(d.y>400) d.y=0;
        
        // Hit detection
        bullets.forEach((b, bi) => {
            if(Math.hypot(d.x-b.x, d.y-b.y) < d.r) {
                debris.splice(i, 1); bullets.splice(bi, 1);
                debris.push({x:Math.random()*400, y:Math.random()*400, vx:Math.random()*2-1, vy:Math.random()*2-1, r:20});
            }
        });
    });

    // Physics
    if(ship.thrust) { ship.vel.x += 0.1 * Math.cos(ship.a); ship.vel.y += 0.1 * Math.sin(ship.a); }
    ship.x += ship.vel.x; ship.y += ship.vel.y;
    ship.a += ship.rot;
    if(ship.x<0) ship.x=400; if(ship.x>400) ship.x=0; if(ship.y<0) ship.y=400; if(ship.y>400) ship.y=0;

    requestAnimationFrame(draw);
}

window.onkeydown = e => {
    if(e.key=='ArrowUp') ship.thrust=true;
    if(e.key=='ArrowLeft') ship.rot=-0.1;
    if(e.key=='ArrowRight') ship.rot=0.1;
    if(e.key==' ') bullets.push({x:ship.x, y:ship.y, vx:5*Math.cos(ship.a), vy:5*Math.sin(ship.a)});
};
window.onkeyup = e => {
    if(e.key=='ArrowUp') ship.thrust=false;
    if(e.key=='ArrowLeft' || e.key=='ArrowRight') ship.rot=0;
};
draw();
</script></body></html>
