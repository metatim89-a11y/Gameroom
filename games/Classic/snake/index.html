<!DOCTYPE html><html><head><title>REFINERY SNAKE</title>
<style>
    body { background:#000; color:#00ff41; font-family:monospace; text-align:center; }
    canvas { border:2px solid #00ff41; background:#050505; margin-top:20px; }
    .score { font-size:1.5em; margin:10px; }
</style></head><body>
    <h1>🐍 REFINERY SNAKE</h1>
    <div class="score">SCRAPS: <span id="score">0</span></div>
    <canvas id="game" width="300" height="300"></canvas>
    <div style="margin-top:10px;">[ ARROWS TO NAVIGATE ]</div>
    <a href="../index.html" style="display:block;margin-top:15px;color:#00ff41;">← BACK</a>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

let score = 0;
let grid = 15;
let count = 0;
let snake = { x: 150, y: 150, dx: grid, dy: 0, cells: [], maxCells: 4 };
let scrap = { x: 30, y: 30 };

function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min)) + min; }

function loop() {
    requestAnimationFrame(loop);
    if (++count < 6) return; // Slow down the frame rate for 8-bit feel
    count = 0;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    snake.x += snake.dx;
    snake.y += snake.dy;

    // Screen wrap logic
    if (snake.x < 0) snake.x = canvas.width - grid;
    else if (snake.x >= canvas.width) snake.x = 0;
    if (snake.y < 0) snake.y = canvas.height - grid;
    else if (snake.y >= canvas.height) snake.y = 0;

    snake.cells.unshift({x: snake.x, y: snake.y});
    if (snake.cells.length > snake.maxCells) snake.cells.pop();

    // Draw Scrap
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(scrap.x, scrap.y, grid-1, grid-1);

    // Draw Snake
    ctx.fillStyle = '#00ff41';
    snake.cells.forEach(function(cell, index) {
        ctx.fillRect(cell.x, cell.y, grid-1, grid-1);
        if (cell.x === scrap.x && cell.y === scrap.y) {
            snake.maxCells++;
            score += 10;
            scoreEl.innerText = score;
            scrap.x = getRandomInt(0, 20) * grid;
            scrap.y = getRandomInt(0, 20) * grid;
        }
        // Collision check
        for (let i = index + 1; i < snake.cells.length; i++) {
            if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                snake.maxCells = 4;
                score = 0;
                scoreEl.innerText = score;
            }
        }
    });
}

document.addEventListener('keydown', function(e) {
    if (e.which === 37 && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
    else if (e.which === 38 && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
    else if (e.which === 39 && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
    else if (e.which === 40 && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
});

requestAnimationFrame(loop);
</script></body></html>
