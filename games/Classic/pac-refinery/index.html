<!DOCTYPE html><html><head><title>PAC-REFINERY</title>
<style>
    body { background:#000; color:#00ff41; font-family:monospace; text-align:center; overflow:hidden; }
    canvas { border:2px solid #00ff41; background:#050505; margin-top:20px; }
    .stats { font-size:1.5em; margin:10px; }
</style></head><body>
    <h1>🟡 PAC-REFINERY</h1>
    <div class="stats">SCORE: <span id="score">0</span></div>
    <canvas id="game" width="360" height="360"></canvas>
    <div style="margin-top:20px;">[ ARROW KEYS TO MOVE ]</div>
    <a href="../index.html" style="display:block;margin-top:20px;color:#00ff41;">← BACK TO CLASSICS</a>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

let score = 0;
let pacman = { x: 180, y: 180, size: 15, dir: 'right' };
let dots = [];

// Generate Refinery Scraps (Dots)
for(let i=0; i<20; i++) {
    dots.push({ x: Math.random()*340+10, y: Math.random()*340+10 });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw Dots
    ctx.fillStyle = '#00ff41';
    dots.forEach(dot => {
        ctx.beginPath();
        ctx.arc(dot.x, dot.y, 3, 0, Math.PI*2);
        ctx.fill();
    });

    // Draw Pacman
    ctx.fillStyle = '#ffff00';
    ctx.beginPath();
    let startAngle = (pacman.dir === 'right') ? 0.2 * Math.PI : (pacman.dir === 'left') ? 1.2 * Math.PI : (pacman.dir === 'up') ? 1.7 * Math.PI : 0.7 * Math.PI;
    let endAngle = startAngle + 1.6 * Math.PI;
    ctx.moveTo(pacman.x, pacman.y);
    ctx.arc(pacman.x, pacman.y, pacman.size, startAngle, endAngle);
    ctx.fill();

    update();
    requestAnimationFrame(draw);
}

function update() {
    if(pacman.dir === 'right') pacman.x += 2;
    if(pacman.dir === 'left') pacman.x -= 2;
    if(pacman.dir === 'up') pacman.y -= 2;
    if(pacman.dir === 'down') pacman.y += 2;

    // Screen Wrap
    if(pacman.x > 360) pacman.x = 0;
    if(pacman.x < 0) pacman.x = 360;
    if(pacman.y > 360) pacman.y = 0;
    if(pacman.y < 0) pacman.y = 360;

    // Collision Check
    dots = dots.filter(dot => {
        let dist = Math.hypot(pacman.x - dot.x, pacman.y - dot.y);
        if(dist < pacman.size) {
            score += 10;
            scoreEl.innerText = score;
            return false;
        }
        return true;
    });
}

window.addEventListener('keydown', e => {
    if(e.key === 'ArrowRight') pacman.dir = 'right';
    if(e.key === 'ArrowLeft') pacman.dir = 'left';
    if(e.key === 'ArrowUp') pacman.dir = 'up';
    if(e.key === 'ArrowDown') pacman.dir = 'down';
});

draw();
</script></body></html>
