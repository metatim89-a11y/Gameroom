<!DOCTYPE html>
<html>
<head>
    <title>Retro Classics</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        .arcade { background: #000; border: 4px solid var(--border); border-radius: 12px; min-height: 350px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 20px; }
        .ttt-grid { display: grid; grid-template-columns: repeat(3, 80px); gap: 10px; }
        .cell { width: 80px; height: 80px; background: #1e293b; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; cursor: pointer; }
        .c4-grid { display: grid; grid-template-columns: repeat(7, 40px); gap: 6px; background: #1e40af; padding: 10px; border-radius: 10px; }
        .c4-cell { width: 40px; height: 40px; background: #fff; border-radius: 50%; cursor: pointer; }
        #status { font-weight: bold; color: var(--accent); margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Retro Classics</h1>
        <div style="display:flex; gap:10px; justify-content:center; margin-bottom: 20px;">
            <button onclick="startTTT()">TIC-TAC-TOE</button>
            <button onclick="startSnake()">SNAKE</button>
            <button onclick="startC4()">CONNECT-4</button>
        </div>

        <div class="arcade" id="screen">
            <div id="status">INITIALIZE MODULE...</div>
            <div id="game-view"></div>
        </div>

        <div id="controls" style="display:none; gap:10px; justify-content:center; margin-top: 20px;">
            <button onclick="undo()">UNDO</button>
            <button onclick="reset()" style="background:#334155; color:white;">RESET</button>
        </div>
        <a href="../../index.html" class="back-link">← BACK</a>
    </div>

    <script>
        let game = null, state = {}, history = [], over = false;
        const screen = document.getElementById('screen');
        const view = document.getElementById('game-view');
        const status = document.getElementById('status');

        function startTTT() {
            game = 'ttt'; history = []; over = false;
            state = { board: Array(9).fill(null), turn: 'X' };
            document.getElementById('controls').style.display = 'flex';
            status.innerText = "Player X Turn";
            render();
        }

        function checkTTTWin(b) {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let l of lines) if(b[l[0]] && b[l[0]]===b[l[1]] && b[l[0]]===b[l[2]]) return b[l[0]];
            return b.includes(null) ? null : 'Draw';
        }

        function startC4() {
            game = 'c4'; history = []; over = false;
            state = { board: Array(6).fill().map(() => Array(7).fill(null)), turn: 'R' };
            document.getElementById('controls').style.display = 'flex';
            status.innerText = "Red Turn";
            render();
        }

        function checkC4Win(b) {
            // Horizontal
            for(let r=0;r<6;r++) for(let c=0;c<4;c++) 
                if(b[r][c] && b[r][c]===b[r][c+1] && b[r][c]===b[r][c+2] && b[r][c]===b[r][c+3]) return b[r][c];
            // Vertical
            for(let c=0;c<7;c++) for(let r=0;r<3;r++) 
                if(b[r][c] && b[r][c]===b[r+1][c] && b[r][c]===b[r+2][c] && b[r][c]===b[r+3][c]) return b[r][c];
            // Diagonals
            for(let r=3;r<6;r++) for(let c=0;c<4;c++) 
                if(b[r][c] && b[r][c]===b[r-1][c+1] && b[r][c]===b[r-2][c+2] && b[r][c]===b[r-3][c+3]) return b[r][c];
            for(let r=0;r<3;r++) for(let c=0;c<4;c++) 
                if(b[r][c] && b[r][c]===b[r+1][c+1] && b[r][c]===b[r+2][c+2] && b[r][c]===b[r+3][c+3]) return b[r][c];
            return null;
        }

        function startSnake() {
            game = 'snake'; over = false; status.innerText = "Snake Active";
            view.innerHTML = '<canvas id="s" width="300" height="300"></canvas>';
            document.getElementById('controls').style.display = 'flex';
            const c = document.getElementById('s'), ctx = c.getContext('2d');
            let s = [{x:10,y:10}], f = {x:15,y:15}, dx=1, dy=0;
            document.onkeydown = e => {
                if(e.key==='ArrowUp'&&dy===0){dx=0;dy=-1}
                if(e.key==='ArrowDown'&&dy===0){dx=0;dy=1}
                if(e.key==='ArrowLeft'&&dx===0){dx=-1;dy=0}
                if(e.key==='ArrowRight'&&dx===0){dx=1;dy=0}
            };
            const loop = setInterval(() => {
                if(game !== 'snake' || over) return clearInterval(loop);
                let head = {x: s[0].x+dx, y: s[0].y+dy};
                if(head.x<0||head.x>=20||head.y<0||head.y>=20||s.some(b=>b.x===head.x&&b.y===head.y)) {
                    over = true; status.innerText = "GAME OVER"; return clearInterval(loop);
                }
                s.unshift(head);
                if(head.x===f.x&&head.y===f.y) f={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)}; else s.pop();
                ctx.fillStyle='#000'; ctx.fillRect(0,0,300,300);
                ctx.fillStyle='#22c55e'; s.forEach(b=>ctx.fillRect(b.x*15,b.y*15,14,14));
                ctx.fillStyle='#ef4444'; ctx.fillRect(f.x*15,f.y*15,14,14);
            }, 150);
        }

        function render() {
            if(game === 'ttt') {
                view.innerHTML = '<div class="ttt-grid">' + state.board.map((v, i) => `<div class="cell" onclick="move(${i})" style="color:${v==='X'?'var(--accent)':'var(--danger)'}">${v||''}</div>`).join('') + '</div>';
            } else if(game === 'c4') {
                view.innerHTML = '<div class="c4-grid">' + state.board.map((row, r) => row.map((v, c) => `<div class="c4-cell" style="background:${v==='R'?'var(--danger)':v==='Y'?'#eab308':'#fff'}" onclick="drop(${c})"></div>`).join('')).join('') + '</div>';
            }
        }

        window.move = (i) => {
            if(state.board[i] || over) return;
            history.push(JSON.parse(JSON.stringify(state)));
            state.board[i] = state.turn;
            let res = checkTTTWin(state.board);
            if(res) { over = true; status.innerText = res === 'Draw' ? "DRAW!" : res + " WINS!"; }
            else { state.turn = state.turn === 'X' ? 'O' : 'X'; status.innerText = "Player " + state.turn + " Turn"; }
            render();
        }

        window.drop = (c) => {
            if(over) return;
            for(let r=5; r>=0; r--) {
                if(!state.board[r][c]) {
                    history.push(JSON.parse(JSON.stringify(state)));
                    state.board[r][c] = state.turn;
                    let res = checkC4Win(state.board);
                    if(res) { over = true; status.innerText = (res === 'R' ? "RED" : "YELLOW") + " WINS!"; }
                    else { state.turn = state.turn === 'R' ? 'Y' : 'R'; status.innerText = (state.turn === 'R' ? "Red" : "Yellow") + " Turn"; }
                    render(); break;
                }
            }
        }

        window.undo = () => { if(history.length && !over) { state = history.pop(); render(); status.innerText = (game==='ttt' ? "Player " : "") + (state.turn==='X'||state.turn==='R' ? (game==='ttt'?"X":"Red") : (game==='ttt'?"O":"Yellow")) + " Turn"; } }
        window.reset = () => { if(game==='ttt') startTTT(); else if(game==='c4') startC4(); else if(game==='snake') startSnake(); }
    </script>
</body>
</html>
