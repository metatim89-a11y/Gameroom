<!DOCTYPE html>
<html>
<head>
    <title>Velocity Wheel</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        .wheel-container { position: relative; width: 340px; height: 340px; margin: 30px auto; }
        .wheel-svg { 
            width: 100%; height: 100%; 
            transition: transform 45s cubic-bezier(0.15, 0, 0.05, 1); 
            filter: drop-shadow(0 0 20px var(--accent));
        }
        .pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 20px solid transparent; 
            border-right: 20px solid transparent; border-top: 40px solid var(--danger); 
            z-index: 20; filter: drop-shadow(0 0 10px var(--danger));
        }
        .timer-bar { 
            width: 100%; height: 8px; background: #334155; 
            border-radius: 4px; margin: 20px 0; overflow: hidden; 
        }
        #timer-fill { 
            width: 100%; height: 100%; background: var(--accent); 
            transition: width 1s linear; 
        }
        .phase-label { font-size: 1.2rem; font-weight: 800; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
        .multiplier-badge { background: #1e293b; border: 1px solid var(--border); padding: 5px 15px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container" style="text-align: center;">
        <h1>Velocity Wheel</h1>
        
        <div class="stats" style="justify-content: space-around; margin-bottom: 20px;">
            <div>BANK: $<span id="balance">1000</span></div>
            <div>MY BET: $<span id="my-bet">0</span></div>
        </div>

        <div class="timer-bar"><div id="timer-fill"></div></div>
        <div id="phase" class="phase-label">Waiting for Bets...</div>
        <div id="countdown" style="font-size: 2rem; font-weight: 900; margin-bottom: 10px;">35s</div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <svg class="wheel-svg" id="wheel" viewBox="0 0 100 100">
                <!-- 2x Sector (0-90) -->
                <path d="M50,50 L50,2 A48,48 0 0,1 98,50 Z" fill="#1e293b" stroke="var(--accent)" stroke-width="0.5"/>
                <!-- 5x Sector (90-180) -->
                <path d="M50,50 L98,50 A48,48 0 0,1 50,98 Z" fill="#0f172a" stroke="var(--accent)" stroke-width="0.5"/>
                <!-- 50x Sector (180-270) -->
                <path d="M50,50 L50,98 A48,48 0 0,1 2,50 Z" fill="#1e293b" stroke="var(--accent)" stroke-width="0.5"/>
                <!-- 3x Sector (270-360) -->
                <path d="M50,50 L2,50 A48,48 0 0,1 50,2 Z" fill="#0f172a" stroke="var(--accent)" stroke-width="0.5"/>
                
                <text x="65" y="30" fill="white" font-size="8" font-weight="900" transform="rotate(0, 70, 30)">2x</text>
                <text x="65" y="75" fill="white" font-size="8" font-weight="900">5x</text>
                <text x="20" y="75" fill="white" font-size="8" font-weight="900">50x</text>
                <text x="20" y="30" fill="white" font-size="8" font-weight="900">3x</text>
            </svg>
        </div>

        <div id="betting-controls" style="margin-top: 20px;">
            <div style="margin-bottom: 15px;">
                <button onclick="placeBet(10)">BET $10</button>
                <button onclick="placeBet(50)">BET $50</button>
                <button onclick="placeBet(100)">BET $100</button>
            </div>
            <button onclick="clearBet()" style="background:#334155; color:white; font-size: 0.8rem;">CLEAR BET</button>
        </div>

        <a href="../../index.html" class="back-link">← EXIT TO GATEWAY</a>
    </div>

    <script>
        let balance = 1000, currentBet = 0, rotation = 0;
        let phase = 'betting'; // 'betting' or 'spinning'
        let timer = 35;

        function updateUI() {
            document.getElementById('balance').innerText = balance;
            document.getElementById('my-bet').innerText = currentBet;
            document.getElementById('countdown').innerText = timer + "s";
            document.getElementById('timer-fill').style.width = (timer / (phase === 'betting' ? 35 : 45) * 100) + "%";
        }

        function placeBet(amt) {
            if(phase !== 'betting' || balance < amt) return;
            balance -= amt;
            currentBet += amt;
            updateUI();
        }

        function clearBet() {
            if(phase !== 'betting') return;
            balance += currentBet;
            currentBet = 0;
            updateUI();
        }

        function runCycle() {
            if(phase === 'betting') {
                if(timer > 0) {
                    timer--;
                } else {
                    startSpin();
                }
            } else {
                if(timer > 0) {
                    timer--;
                } else {
                    endSpin();
                }
            }
            updateUI();
        }

        function startSpin() {
            phase = 'spinning';
            timer = 45;
            document.getElementById('phase').innerText = "Wheel in Motion...";
            document.getElementById('betting-controls').style.opacity = "0.3";
            
            // Randomly select winning sector (0=2x, 1=5x, 2=50x, 3=3x)
            const sectorIdx = Math.floor(Math.random() * 4);
            const extraSpins = 10 * 360; // Many spins for 45s
            const stopAngle = (sectorIdx * 90) + 45; // Land in middle of sector
            
            // Note: SVG wheel starts with 2x at top-right (0-90)
            // Pointer is at the very top (0 deg)
            // We want to land on sectorIdx.
            rotation += extraSpins + (360 - (rotation % 360)) + (360 - stopAngle);
            document.getElementById('wheel').style.transform = `rotate(${rotation}deg)`;
            
            // Store the result for later
            window.winMultiplier = [2, 5, 50, 3][sectorIdx];
        }

        function endSpin() {
            const win = currentBet * window.winMultiplier;
            balance += win;
            
            alert(`CYCLE COMPLETE!\nResult: ${window.winMultiplier}x\nWin: $${win}`);
            
            phase = 'betting';
            timer = 35;
            currentBet = 0;
            document.getElementById('phase').innerText = "Waiting for Bets...";
            document.getElementById('betting-controls').style.opacity = "1";
            updateUI();
        }

        setInterval(runCycle, 1000);
        updateUI();
    </script>
</body>
</html>
