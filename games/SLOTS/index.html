<!-- ./gameroom/games/SLOTS/index.html v15.0 - Wealth Refinery: The Dashboard Update -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Wealth Refinery | Dashboard v15</title>
<link rel="stylesheet" href="../../style.css">
<style>
:root {
    --gold: #ffd700;
    --gold-glow: rgba(255, 215, 0, 0.6);
    --money-green: #00ff88;
    --danger: #ff3366;
    --slot-bg: #030305;
    --panel-bg: #0a0a12;
    --reel-width: 95px;
    --symbol-size: 95px;
    --grid-rows: 5;
}

body {
    background: #010103;
    color: #fff;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 100vh;
    margin: 0;
    font-family: 'Space Mono', monospace;
}

#fx-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
.particle { position: absolute; font-size: 2rem; pointer-events: none; }

/* TOP BAR HUD */
.top-hud {
    display: flex; justify-content: space-between; align-items: center;
    padding: 15px 30px; background: linear-gradient(180deg, #111, transparent);
    z-index: 50;
}
.treasury-display {
    background: rgba(0,0,0,0.8); border: 1px solid var(--money-green);
    padding: 10px 25px; border-radius: 40px; box-shadow: 0 0 20px rgba(0,255,136,0.2);
}
.treasury-display label { font-size: 0.6rem; color: #888; display: block; text-transform: uppercase; }
.treasury-display span { color: var(--money-green); font-size: 1.5rem; font-weight: 900; }

/* MAIN GAME AREA */
.game-viewport {
    flex: 1; display: flex; align-items: center; justify-content: center; position: relative;
    perspective: 1000px;
}

.reels-window {
    position: relative; display: flex; gap: 8px;
    background: var(--slot-bg); padding: 15px; border-radius: 30px;
    border: 3px solid #222; box-shadow: 0 20px 60px rgba(0,0,0,0.8), inset 0 0 100px #000;
    height: calc(var(--grid-rows) * var(--symbol-size));
    transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.reel { width: var(--reel-width); height: 100%; position: relative; overflow: hidden; }
.reel.sticky { background: rgba(170,0,255,0.05); border-radius: 10px; }

#colossal-symbol {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: calc(var(--reel-width) * 3 + 16px); height: calc(var(--symbol-size) * 3);
    background: rgba(0,0,0,0.9); border: 4px solid #aa00ff; border-radius: 20px;
    display: none; align-items: center; justify-content: center; font-size: 10rem;
    z-index: 50; box-shadow: 0 0 50px rgba(170,0,255,0.6);
}

/* SIDEBAR TABS */
.sidebar-tab {
    position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 10px; padding: 10px;
}
.btn-tab {
    background: #111; border: 1px solid #333; color: #888; width: 50px; height: 50px;
    border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; transition: all 0.2s;
}
.btn-tab:hover { border-color: var(--gold); color: #fff; }

/* BOTTOM DASHBOARD */
.dashboard {
    background: #050508; border-top: 2px solid #222;
    padding: 20px 40px 40px; display: grid;
    grid-template-columns: 1fr 1fr 1fr; align-items: center;
    box-shadow: 0 -20px 50px rgba(0,0,0,0.5);
}

.bet-controls { display: flex; align-items: center; gap: 15px; }
.bet-display { text-align: center; min-width: 100px; }
.bet-display label { font-size: 0.6rem; color: #555; display: block; }
.bet-display span { font-size: 1.8rem; font-weight: 900; color: var(--gold); }

.win-center { text-align: center; }
.win-center label { font-size: 0.7rem; color: #888; letter-spacing: 2px; }
#last-win { font-size: 2.5rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px var(--gold-glow); }

.spin-center { display: flex; justify-content: flex-end; align-items: center; gap: 20px; }

/* THE BIG SPIN BUTTON */
.btn-reactor {
    width: 100px; height: 100px; border-radius: 50%; border: none;
    background: radial-gradient(circle at 30% 30%, var(--gold), #8b6508);
    box-shadow: 0 10px 0 #443300, 0 20px 40px rgba(0,0,0,0.5);
    cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: all 0.1s;
}
.btn-reactor:active { transform: translateY(5px); box-shadow: 0 5px 0 #443300; }
.btn-reactor span { font-weight: 900; color: #000; font-size: 1rem; }
.btn-reactor.auto-active { background: radial-gradient(circle at 30% 30%, var(--money-green), #004422); box-shadow: 0 10px 0 #002211; }
.btn-reactor.spinning { background: radial-gradient(circle at 30% 30%, var(--danger), #880022); box-shadow: 0 10px 0 #440011; }

.sub-btn { background: #1a1a1a; border: 1px solid #333; color: #666; padding: 10px 15px; border-radius: 10px; font-weight: bold; font-size: 0.7rem; cursor: pointer; }
.sub-btn.active { border-color: var(--money-green); color: var(--money-green); box-shadow: 0 0 10px rgba(0,255,136,0.2); }

/* OVERLAYS */
.overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px;
}
.choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 800px; }
.choice-card { background: #111; border: 1px solid #333; padding: 25px; border-radius: 20px; cursor: pointer; text-align: center; }
.choice-card:hover { border-color: var(--gold); }

@keyframes pulse-reactor { 0% { box-shadow: 0 10px 0 #443300, 0 0 20px var(--gold-glow); } 50% { box-shadow: 0 10px 0 #443300, 0 0 50px var(--gold-glow); } 100% { box-shadow: 0 10px 0 #443300, 0 0 20px var(--gold-glow); } }
.btn-reactor:not(:disabled):hover { animation: pulse-reactor 1s infinite; }
</style>
</head>
<body>

<div id="fx-overlay"></div>

<div class="top-hud">
    <div style="display:flex; align-items:center; gap:20px;">
        <a href="../../index.html" class="sub-btn">← HUB</a>
        <div id="status-ind" style="font-weight:bold; color:var(--gold); font-size:0.7rem;">STATUS: REFINING</div>
    </div>
    <div class="treasury-display">
        <label>Total Treasury</label>
        <span id="balance">1000.00</span>
    </div>
</div>

<div class="game-viewport">
    <div class="sidebar-tab">
        <button class="btn-tab" onclick="openBuyMenu()" title="Buy Contract">📜</button>
        <button class="btn-tab" onclick="$('paytable').style.display='flex'" title="Info">ℹ️</button>
    </div>

    <div class="reels-window" id="reels-window">
        <div id="colossal-symbol">💎</div>
        <div class="reel" id="reel-0"><div class="symbol-strip" id="strip-0"></div></div>
        <div class="reel" id="reel-1"><div class="symbol-strip" id="strip-1"></div></div>
        <div class="reel" id="reel-2"><div class="symbol-strip" id="strip-2"></div></div>
        <div class="reel" id="reel-3"><div class="symbol-strip" id="strip-3"></div></div>
        <div class="reel" id="reel-4"><div class="symbol-strip" id="strip-4"></div></div>
    </div>
</div>

<div class="dashboard">
    <div class="bet-controls">
        <button class="sub-btn" onclick="adjustBet(-10)">-</button>
        <div class="bet-display">
            <label>Investment</label>
            <span id="current-bet">10</span>
        </div>
        <button class="sub-btn" onclick="adjustBet(10)">+</button>
        <button class="sub-btn" onclick="state.bet = 500; updateUI()">MAX</button>
    </div>

    <div class="win-center">
        <label>CURRENT PAYOUT</label>
        <div id="last-win">0.00</div>
    </div>

    <div class="spin-center">
        <button class="sub-btn" id="fast-btn" onclick="toggleFastMode()">FAST</button>
        <button class="sub-btn" id="auto-btn" onclick="toggleAutoPlay()">AUTO</button>
        <button class="btn-reactor" id="spin-btn" onclick="spin()">
            <span id="spin-text">SPIN</span>
        </button>
    </div>
</div>

<!-- OVERLAYS (REUSED LOGIC) -->
<div id="bonus-choice" class="overlay">
    <h2 style="color:var(--gold)">WEALTH CONTRACTS</h2>
    <div class="choice-grid">
        <div class="choice-card" onclick="selectBonus(0)"><h3>Mega Rows</h3><p>5x9 Grid Expansion</p></div>
        <div class="choice-card" onclick="selectBonus(1)"><h3>Colossal Vault</h3><p>3x3 Giant Symbol</p></div>
        <div class="choice-card" onclick="selectBonus(2)"><h3>Treasury x10</h3><p>Global Multiplier</p></div>
        <div class="choice-card" onclick="selectBonus(3)" style="border-color:#aa00ff"><h3>Ultimate</h3><p>Combined Power</p></div>
    </div>
</div>

<div id="paytable" class="overlay">
    <h2 style="color:var(--gold)">REFINERY DATA</h2>
    <div id="pay-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:15px; width:100%;"></div>
    <button class="sub-btn" onclick="$('paytable').style.display='none'" style="margin-top:30px; width:200px;">CLOSE</button>
</div>

<script>
const SYMBOLS = [
    { s: "👑", v: 100 }, { s: "💎", v: 50 }, { s: "💰", v: 25 }, { s: "🥇", v: 15 },
    { s: "🥈", v: 10 }, { s: "💵", v: 5 }, { s: "🪙", v: 2 }, { s: "🌟", v: 0 }, { s: "📜", v: 0 }
];

let state = {
    balance: 1000, bet: 10, isSpinning: false, canStop: false, autoPlay: false, fastMode: false,
    freeSpins: 0, bonusMode: false, bonusType: -1, gridRows: 5, colossalIdx: -1
};

const $ = (id) => document.getElementById(id);
const reelElems = [0,1,2,3,4].map(i => $(`strip-${i}`));
const winDisplay = $('last-win');
const spinBtn = $('spin-btn');
let stopResolver = null;

function rainWealth(count = 30) {
    for(let i=0; i<count; i++) {
        setTimeout(() => {
            const p = document.createElement('div'); p.className = 'particle'; p.textContent = ['💰','🪙','💵','💎','🥇'][Math.floor(Math.random()*5)];
            p.style.left = Math.random()*window.innerWidth + 'px'; p.style.top = '-50px'; $('fx-overlay').appendChild(p);
            p.animate([{ transform: `translate(0,0)`, opacity: 1 }, { transform: `translate(${(Math.random()-0.5)*400}px, ${window.innerHeight}px) rotate(720deg)`, opacity: 0 }], { duration: 2000 }).onfinish = () => p.remove();
        }, i*50);
    }
}

function init() { 
    reelElems.forEach(strip => populateStrip(strip, true)); 
    const pg = $('pay-grid');
    SYMBOLS.slice(0,7).forEach(sym => {
        pg.innerHTML += `<div style="background:#111; padding:10px; border-radius:10px; text-align:center;"><span>${sym.s}</span><br><b>${sym.v*5}x</b></div>`;
    });
    updateUI(); 
}

function populateStrip(strip, isStatic = false) {
    let html = ''; const count = isStatic ? state.gridRows : 40;
    for (let i = 0; i < count; i++) html += `<div class="symbol">${SYMBOLS[Math.floor(Math.random() * (SYMBOLS.length-2))].s}</div>`;
    strip.innerHTML = html;
}

function updateUI() {
    $('balance').innerText = state.balance.toFixed(2);
    $('current-bet').innerText = state.bet;
    $('auto-btn').classList.toggle('active', state.autoPlay);
    $('fast-btn').classList.toggle('active', state.fastMode);
    
    if (state.isSpinning) {
        spinBtn.classList.add('spinning');
        $('spin-text').innerText = "STOP";
    } else {
        spinBtn.classList.remove('spinning');
        if (state.freeSpins > 0) {
            spinBtn.style.background = "#aa00ff";
            $('spin-text').innerText = "FREE";
        } else if (state.autoPlay) {
            spinBtn.classList.add('auto-active');
            $('spin-text').innerText = "AUTO";
        } else {
            spinBtn.classList.remove('auto-active');
            spinBtn.style.background = "";
            $('spin-text').innerText = "SPIN";
        }
    }
}

function adjustBet(amount) { if (!state.isSpinning && !state.bonusMode) { state.bet = Math.max(10, Math.min(500, state.bet + amount)); updateUI(); } }
function toggleAutoPlay() { state.autoPlay = !state.autoPlay; updateUI(); if (state.autoPlay && !state.isSpinning) spin(); }
function toggleFastMode() { state.fastMode = !state.fastMode; updateUI(); }
function openBuyMenu() { if (!state.isSpinning && !state.bonusMode) $('bonus-choice').style.display = 'flex'; }

function selectBonus(type) {
    state.bonusType = type; state.bonusMode = true; state.freeSpins = 10;
    if (type === 0 || type === 3) { state.gridRows = 9; document.documentElement.style.setProperty('--grid-rows', '9'); }
    else { state.gridRows = 5; document.documentElement.style.setProperty('--grid-rows', '5'); }

    $('bonus-choice').style.display = 'none';
    $('main-container').classList.add('bonus-mode');
    
    if (type === 1 || type === 3) {
        state.colossalIdx = Math.floor(Math.random()*7);
        $('colossal-symbol').innerText = SYMBOLS[state.colossalIdx].s;
        $('colossal-symbol').style.display = 'flex';
        $('reels-window').classList.add('colossal-active');
    }

    rainWealth(50);
    reelElems.forEach(strip => populateStrip(strip, true));
    updateUI();
    setTimeout(spin, 1000);
}

function evaluateWays(resultsGrid) {
    let totalWin = 0;
    const mult = (state.bonusType === 2 || state.bonusType === 3) ? 10 : 1;

    SYMBOLS.forEach((symDef, symIdx) => {
        if (symIdx >= 7) return;
        let ways = 1, matchLength = 0;
        for (let c = 0; c < 5; c++) {
            let countInCol = 0;
            for (let r = 0; r < state.gridRows; r++) if (resultsGrid[c][r] === symIdx) countInCol++;
            if (countInCol > 0) { ways *= countInCol; matchLength++; } else break;
        }
        if (matchLength >= 3) totalWin += symDef.v * ways * [0,0,0,1,2,5][matchLength] * (state.bet / 10) * mult;
    });

    let sc = 0, mystery = false;
    for (let c = 0; c < 5; c++) for (let r = 0; r < state.gridRows; r++) {
        if (resultsGrid[c][r] === 7) sc++;
        if (resultsGrid[c][r] === 8) mystery = true;
    }
    return { win: totalWin, scatters: sc, mystery: mystery };
}

async function spin() {
    if (state.isSpinning) { if (state.canStop && stopResolver) stopResolver(); return; }
    if (state.balance < state.bet && state.freeSpins === 0) { state.autoPlay = false; updateUI(); return; }

    state.isSpinning = true; state.canStop = false;
    if (state.freeSpins > 0) state.freeSpins--; else state.balance -= state.bet;
    
    let isMysterySpin = !state.bonusMode && Math.random() < 0.05;
    winDisplay.innerText = "0.00"; updateUI();

    const resultsGrid = [];
    let rtp = parseInt(localStorage.getItem('slots_rtp') || "95");
    let forceWin = !state.bonusMode && Math.random() < (rtp - 100) / 100;
    let forceLoss = !state.bonusMode && Math.random() < (100 - rtp) / 100;

    for (let c = 0; c < 5; c++) {
        let col = [];
        for (let r = 0; r < state.gridRows; r++) {
            if (state.bonusMode && (state.bonusType === 1 || state.bonusType === 3) && c >= 1 && c <= 3 && r >= 1 && r <= 3) {
                col.push(state.colossalIdx);
            } else {
                let sym;
                if (forceWin && c > 0) sym = resultsGrid[c-1][r];
                else if (forceLoss && c > 0 && Math.random() > 0.5) {
                    sym = Math.floor(Math.random()*7);
                    while(sym === resultsGrid[c-1][r]) sym = Math.floor(Math.random()*7);
                } else {
                    let rand = Math.random();
                    if (rand < 0.03) sym = 7;
                    else if (rand < 0.05) sym = 8;
                    else sym = Math.floor(Math.random()*7);
                }
                col.push(sym);
            }
        }
        resultsGrid.push(col);
    }

    reelElems.forEach((strip, c) => {
        let html = ''; for (let j = 0; j < 35; j++) html += `<div class="symbol">${SYMBOLS[Math.floor(Math.random()*7)].s}</div>`;
        resultsGrid[c].forEach(symIdx => html += `<div class="symbol" data-sym="${symIdx}">${SYMBOLS[symIdx].s}</div>`);
        strip.innerHTML = html; strip.style.transition = 'none'; strip.style.transform = 'translateY(0)'; strip.offsetHeight;
    });

    setTimeout(() => state.canStop = true, state.fastMode ? 100 : 400);
    const spinPromise = new Promise(resolve => { stopResolver = resolve; setTimeout(resolve, state.fastMode ? 600 : 2500); });

    reelElems.forEach((strip, c) => {
        const time = state.fastMode ? (300 + c*50) : (1200 + c*300);
        strip.style.transition = `transform ${time}ms cubic-bezier(0.2, 0.8, 0.2, 1)`;
        strip.style.transform = `translateY(-${(strip.children.length - state.gridRows) * 95}px)`;
    });

    await spinPromise; stopResolver = null;
    reelElems.forEach((strip, c) => {
        strip.style.transition = 'transform 0.1s ease-out';
        strip.style.transform = `translateY(-${(strip.children.length - state.gridRows) * 95}px)`;
    });

    await new Promise(r => setTimeout(r, state.fastMode ? 50 : 150));
    const evalRes = evaluateWays(resultsGrid);
    if (evalRes.win > 0) { state.balance += evalRes.win; animateValue(winDisplay, 0, evalRes.win, state.fastMode ? 200 : 800); }
    
    state.isSpinning = false; updateUI();

    if (evalRes.scatters >= 3 || isMysterySpin || evalRes.mystery) {
        setTimeout(() => {
            if (isMysterySpin || evalRes.mystery) selectBonus(Math.floor(Math.random()*4));
            else openBuyMenu();
        }, 1000);
    } else if (state.freeSpins > 0) {
        setTimeout(spin, state.fastMode ? 200 : 1000);
    } else if (state.bonusMode && state.freeSpins === 0) {
        setTimeout(() => {
            state.bonusMode = false; state.gridRows = 5; document.documentElement.style.setProperty('--grid-rows', '5');
            $('main-container').classList.remove('bonus-mode');
            $('colossal-symbol').style.display = 'none'; $('reels-window').classList.remove('colossal-active');
            updateUI();
        }, 2000);
    } else if (state.autoPlay) setTimeout(() => { if (state.autoPlay) spin(); }, state.fastMode ? 300 : 1000);
}

function animateValue(obj, start, end, duration) {
    let startTimestamp = null;
    const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        obj.innerText = (progress * (end - start) + start).toFixed(2);
        if (progress < 1) window.requestAnimationFrame(step);
    };
    window.requestAnimationFrame(step);
}

init();
</script>
</body>
</html>
