<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Quantum Slots | Premium Suite</title>
<link rel="stylesheet" href="../../style.css">
<style>
/* 
    GAMEROOM OVERRIDE & EXTENSION 
    Using root variables from style.css for theme consistency
*/
:root {
    --gold: #ffd700;
    --gold-glow: rgba(255, 215, 0, 0.6);
    --silver: #e0e0e0;
    --money-green: #00ff88;
    --slot-bg: #050508;
    --reel-width: 120px;
    --reel-height: 360px;
    --symbol-size: 120px;
}

body {
    background: #030305;
    color: var(--text);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

/* Machine Frame */
.slot-container {
    position: relative;
    width: 100%;
    max-width: 900px;
    padding: 40px;
    background: linear-gradient(180deg, #1a1a1a 0%, #000000 100%);
    border: 4px solid #444;
    border-radius: 40px;
    box-shadow: 
        0 0 0 10px #222,
        0 20px 50px rgba(0,0,0,0.9),
        inset 0 0 40px var(--gold);
    transform: perspective(1000px) rotateX(5deg);
}

.machine-header {
    text-align: center;
    margin-bottom: 30px;
}

.machine-header h1 {
    font-size: 3rem;
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 5px;
    color: var(--gold);
    text-shadow: 0 0 20px var(--gold-glow);
}

/* Reels Display */
.reels-window {
    position: relative;
    display: flex;
    justify-content: center;
    gap: 15px;
    background: var(--slot-bg);
    padding: 20px;
    border-radius: 20px;
    border: 2px solid rgba(255,255,255,0.1);
    box-shadow: inset 0 0 50px #000;
    overflow: hidden;
}

/* Curvature Effect */
.reels-window::before,
.reels-window::after {
    content: "";
    position: absolute;
    left: 0; right: 0; height: 80px;
    z-index: 10;
    pointer-events: none;
}
.reels-window::before {
    top: 0;
    background: linear-gradient(to bottom, var(--slot-bg) 0%, transparent 100%);
}
.reels-window::after {
    bottom: 0;
    background: linear-gradient(to top, var(--slot-bg) 0%, transparent 100%);
}

.reel {
    width: var(--reel-width);
    height: var(--reel-height);
    background: rgba(255,255,255,0.02);
    border-radius: 10px;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.05);
}

.symbol-strip {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    will-change: transform;
}

.symbol {
    height: var(--symbol-size);
    width: var(--reel-width);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    transition: filter 0.3s ease;
}

.symbol.win-pulse {
    animation: win-flash 0.5s ease infinite alternate;
    filter: drop-shadow(0 0 15px var(--gold));
}

@keyframes win-flash {
    from { transform: scale(1); filter: brightness(1) drop-shadow(0 0 5px var(--gold)); }
    to { transform: scale(1.1); filter: brightness(1.5) drop-shadow(0 0 20px var(--gold)); }
}

/* Payline overlay */
.paylines-canvas {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 15;
}

/* HUD / Controls */
.dashboard {
    margin-top: 30px;
    display: grid;
    grid-template-columns: 1.5fr 1fr 1.5fr;
    gap: 20px;
    align-items: center;
}

.display-box {
    background: #000;
    border: 1px solid var(--primary);
    border-radius: 10px;
    padding: 10px 20px;
    text-align: center;
    box-shadow: 0 0 10px rgba(0,242,255,0.2);
}

.display-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 5px;
}

.display-value {
    font-family: 'Space Mono', monospace;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--primary);
}

.controls-group {
    display: flex;
    gap: 10px;
    justify-content: center;
}

.btn-slot {
    background: linear-gradient(180deg, #333 0%, #111 100%);
    border: 2px solid #555;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
    transition: all 0.2s;
}

.btn-slot:hover:not(:disabled) {
    border-color: var(--primary);
    box-shadow: 0 0 15px var(--primary);
}

.btn-spin {
    background: linear-gradient(180deg, var(--primary) 0%, var(--secondary) 100%);
    border: none;
    color: #000;
    width: 100%;
    padding: 20px;
    font-size: 1.5rem;
    border-radius: 15px;
    box-shadow: 0 5px 0 #0088aa;
    margin-top: 20px;
}

.btn-spin:active {
    transform: translateY(3px);
    box-shadow: 0 2px 0 #0088aa;
}

.btn-spin:disabled {
    filter: grayscale(1);
    opacity: 0.5;
    cursor: not-allowed;
}

/* Navigation */
.nav-bar {
    position: absolute;
    top: 20px;
    left: 20px;
    right: 20px;
    display: flex;
    justify-content: space-between;
}

.back-btn {
    text-decoration: none;
    color: var(--text);
    font-size: 0.8rem;
    padding: 8px 15px;
    border: 1px solid var(--primary);
    border-radius: 20px;
}
</style>
</head>
<body>

<div class="nav-bar">
    <a href="../../index.html" class="back-btn">← HUB</a>
    <div class="status-indicator">SYSTEM: STABLE</div>
</div>

<div class="slot-container">
    <div class="machine-header">
        <h1>WEALTH REFINERY</h1>
    </div>

    <div class="reels-window">
        <canvas id="paylines" class="paylines-canvas"></canvas>
        <div class="reel"><div class="symbol-strip" id="reel-0"></div></div>
        <div class="reel"><div class="symbol-strip" id="reel-1"></div></div>
        <div class="reel"><div class="symbol-strip" id="reel-2"></div></div>
    </div>

    <div class="dashboard">
        <div class="display-box" style="border-color: var(--money-green)">
            <div class="display-label">Treasury</div>
            <div class="display-value" id="balance" style="color: var(--money-green)">1000.00</div>
        </div>
        
        <div class="controls-group">
            <button class="btn-slot" onclick="adjustBet(-5)">-</button>
            <div class="display-box" style="border-color: var(--gold)">
                <div class="display-label">Investment</div>
                <div class="display-value" id="current-bet" style="color: var(--gold)">10</div>
            </div>
            <button class="btn-slot" onclick="adjustBet(5)">+</button>
        </div>

        <div class="display-box" style="border-color: var(--gold)">
            <div class="display-label">Last Payout</div>
            <div class="display-value" id="last-win" style="color: var(--gold)">0.00</div>
        </div>
    </div>

    <button class="btn-spin" id="spin-btn" style="background: linear-gradient(180deg, var(--gold) 0%, #b8860b 100%); color: #000; box-shadow: 0 5px 0 #8b6508;">SPIN REELS</button>
</div>

<script>
/**
 * WEALTH REFINERY ENGINE v12.1
 */

const SYMBOLS = [
    { s: "💎", v: 100, n: "Diamond" },
    { s: "💰", v: 50, n: "Money Bag" },
    { s: "🥇", v: 30, n: "Gold" },
    { s: "🥈", v: 20, n: "Silver" },
    { s: "💵", v: 10,  n: "Cash" },
    { s: "🪙", v: 5,   n: "Coin" },
    { s: "👑", v: 250, n: "Jackpot" }
];

let state = {
    balance: 1000,
    bet: 10,
    isSpinning: false,
    reels: [[], [], []]
};

const $ = (id) => document.getElementById(id);
const reelElems = [$('reel-0'), $('reel-1'), $('reel-2')];
const balanceDisplay = $('balance');
const winDisplay = $('last-win');
const betDisplay = $('current-bet');
const spinBtn = $('spin-btn');

// Initialize Reels
function init() {
    reelElems.forEach((reel, i) => {
        populateStrip(reel, true);
    });
    updateUI();
}

function populateStrip(strip, isStatic = false) {
    const symbolsCount = isStatic ? 3 : 30;
    let html = '';
    for (let i = 0; i < symbolsCount; i++) {
        const symbol = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
        html += `<div class="symbol">${symbol.s}</div>`;
    }
    strip.innerHTML = html;
}

function updateUI() {
    balanceDisplay.innerText = state.balance.toFixed(2);
    betDisplay.innerText = state.bet;
    spinBtn.disabled = state.isSpinning || state.balance < state.bet;
}

function adjustBet(amount) {
    state.bet = Math.max(5, Math.min(100, state.bet + amount));
    updateUI();
}

async function spin() {
    if (state.isSpinning || state.balance < state.bet) return;

    state.isSpinning = true;
    state.balance -= state.bet;
    winDisplay.innerText = "0.00";
    updateUI();

    const results = [
        Math.floor(Math.random() * SYMBOLS.length),
        Math.floor(Math.random() * SYMBOLS.length),
        Math.floor(Math.random() * SYMBOLS.length)
    ];

    // Animation Phase
    const spinDurations = [2000, 2500, 3000];
    
    reelElems.forEach((strip, i) => {
        // Prepend result to next strip generation
        const resultSymbol = SYMBOLS[results[i]];
        let html = '';
        // Add 20 random ones for motion blur feel
        for (let j = 0; j < 30; j++) {
            html += `<div class="symbol">${SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)].s}</div>`;
        }
        // The final visible window (3 symbols)
        html += `<div class="symbol">${resultSymbol.s}</div>`;
        html += `<div class="symbol">${SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)].s}</div>`;
        html += `<div class="symbol">${SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)].s}</div>`;
        
        strip.innerHTML = html;
        strip.style.transition = 'none';
        strip.style.transform = 'translateY(0)';
        
        // Trigger reflow
        strip.offsetHeight;
        
        const travel = (strip.children.length - 3) * 120;
        strip.style.transition = `transform ${spinDurations[i]}ms cubic-bezier(0.45, 0.05, 0.55, 0.95)`;
        strip.style.transform = `translateY(-${travel}px)`;
    });

    await new Promise(r => setTimeout(r, 3100));

    checkWin(results);
    state.isSpinning = false;
    updateUI();
}

function checkWin(results) {
    let win = 0;
    const r1 = results[0], r2 = results[1], r3 = results[2];

    if (r1 === r2 && r2 === r3) {
        // Triple Match
        win = state.bet * SYMBOLS[r1].v;
        flashWin();
    } else if (r1 === r2 || r2 === r3 || r1 === r3) {
        // Double Match
        win = state.bet * 2;
    }

    if (win > 0) {
        state.balance += win;
        animateValue(winDisplay, 0, win, 1000);
    }
}

function animateValue(obj, start, end, duration) {
    let startTimestamp = null;
    const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        obj.innerText = (progress * (end - start) + start).toFixed(2);
        if (progress < 1) {
            window.requestAnimationFrame(step);
        }
    };
    window.requestAnimationFrame(step);
}

function flashWin() {
    const symbols = document.querySelectorAll('.symbol');
    // Simplified: pulse all for now, logic can be refined for specific line
    symbols.forEach(s => s.classList.add('win-pulse'));
    setTimeout(() => {
        symbols.forEach(s => s.classList.remove('win-pulse'));
    }, 2000);
}

spinBtn.onclick = spin;

init();
</script>
</body>
</html>
