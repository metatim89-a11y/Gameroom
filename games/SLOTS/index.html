<!-- ./gameroom/games/SLOTS/index.html v10.2 - Mechanical Realism Edition -->
<!DOCTYPE html>
<html>
<head>
    <title>Omni Slots Pro</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        .grid-container { display: grid; gap: 12px; background: #0f172a; padding: 20px; border-radius: 16px; border: 3px solid var(--accent); margin: auto; transition: all 0.5s ease; }
        
        .cell { 
            background: #1e293b; border-radius: 10px; aspect-ratio: 1; 
            display: flex; align-items: center; justify-content: center; padding: 10px;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.6s;
            position: relative; overflow: hidden;
            border: 1px solid var(--border);
        }

        /* The "Growth" and "Spin" State */
        .cell.spinning { 
            transform: scale(1.15); 
            box-shadow: 0 0 30px var(--accent);
            border-color: var(--accent);
            z-index: 10;
        }

        .symbol-wrapper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

        .blur-motion {
            animation: mechanicalSpin 0.1s infinite linear;
        }

        @keyframes mechanicalSpin {
            0% { transform: translateY(-20px); filter: blur(8px) brightness(1.5); opacity: 0.7; }
            100% { transform: translateY(20px); filter: blur(8px) brightness(1.5); opacity: 0.7; }
        }

        /* Snap effect on stop */
        .cell.snap { animation: snapEffect 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes snapEffect {
            0% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .bonus-overlay { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; border-radius: 20px; text-align: center; border: 4px solid var(--accent); }
    </style>
</head>
<body>
    <div class="container" style="position: relative;">
        <div id="bonus-screen" class="bonus-overlay"></div>
        <h1>Quantum Slots Pro</h1>
        
        <div class="stats">
            <div>BANK: $<span id="balance">1000</span></div>
            <div>BET: $<span id="bet">10</span></div>
            <div style="color: var(--success)">WIN: $<span id="win">0</span></div>
        </div>
        
        <div style="display:flex; gap:20px; justify-content:center; margin-bottom: 20px;">
            <div class="card" style="padding:10px; flex-direction:row; gap:10px;">
                <span>Grid:</span>
                <button onclick="resize(-1)">-</button>
                <span id="size-label" style="font-weight:900">3x3</span>
                <button onclick="resize(1)">+</button>
            </div>
            <div class="card" style="padding:10px; flex-direction:row; gap:10px;">
                <span>Bet:</span>
                <button onclick="adjustBet(-10)">-</button>
                <button onclick="adjustBet(10)">+</button>
            </div>
        </div>

        <div class="game-box" style="padding:10px;"><div id="grid" class="grid-container"></div></div>
        
        <div style="text-align:center; margin-top:20px;">
            <button id="spin-btn" onclick="play()" style="width: 280px; font-size: 1.5rem; height: 60px;">INITIATE MECHANICAL SPIN</button>
        </div>
        
        <a href="../../index.html" class="back-link">← TERMINATE SESSION</a>
    </div>

    <script>
        const icons = {
            clover: `<svg viewBox="0 0 24 24" fill="#22c55e"><path d="M12,10C12.7,10 13.2,9.5 13.2,8.8V4.2C13.2,3.5 12.7,3 12,3C11.3,3 10.8,3.5 10.8,4.2V8.8C10.8,9.5 11.3,10 12,10M17,11.2H21.8C22.5,11.2 23,10.7 23,10C23,9.3 22.5,8.8 21.8,8.8H17C16.3,8.8 15.8,9.3 15.8,10C15.8,10.7 16.3,11.2 17,11.2M7,11.2H2.2C1.5,11.2 1,10.7 1,10C1,9.3 1.5,8.8 2.2,8.8H7C7.7,8.8 8.2,9.3 8.2,10C8.2,10.7 7.7,11.2 7,11.2M12,14C11.3,14 10.8,14.5 10.8,15.2V19.8C10.8,20.5 11.3,21 12,21C12.7,21 13.2,20.5 13.2,19.8V15.2C13.2,14.5 12.7,14 12,14Z"/></svg>`,
            gold: `<svg viewBox="0 0 24 24" fill="#eab308"><path d="M5,6H19V18H5V6M19,4H5C3.89,4 3,4.89 3,6V18C3,19.11 3.89,20 5,20H19C20.11,20 21,19.11 21,18V6C21,4.89 20.11,4 19,4M12,15A3,3 0 0,1 9,12A3,3 0 0,1 12,9A3,3 0 0,1 15,12A3,3 0 0,1 12,15Z"/></svg>`,
            rainbow: `<svg viewBox="0 0 24 24" fill="#38bdf8"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4Z"/></svg>`,
            hat: `<svg viewBox="0 0 24 24" fill="#166534"><path d="M5,16L3,5L8.5,10L12,2L15.5,10L21,5L19,16H5M19,19C19,19.55 18.55,20 18,20H6C5.45,20 5,19.55 5,19V18H19V19Z"/></svg>`
        };
        const syms = ['clover', 'gold', 'rainbow', 'hat'];
        let balance = 1000, bet = 10, size = 3, spinning = false;

        function init() {
            const grid = document.getElementById('grid');
            grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            grid.innerHTML = '';
            for(let i=0; i<size*size; i++) {
                grid.innerHTML += `<div class="cell" id="c${i}"><div class="symbol-wrapper" id="w${i}">${icons.clover}</div></div>`;
            }
        }

        function resize(d) {
            if(spinning) return;
            size = Math.max(3, Math.min(6, size + d));
            document.getElementById('size-label').innerText = `${size}x${size}`;
            init();
        }

        function adjustBet(d) {
            if(spinning) return;
            bet = Math.max(10, Math.min(balance, bet + d));
            document.getElementById('bet').innerText = bet;
        }

        function play() {
            if(spinning || balance < bet) return;
            spinning = true; balance -= bet; document.getElementById('balance').innerText = balance;
            
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;

            // Phase 1: Growth & Acceleration
            for(let i=0; i<size*size; i++) {
                const cell = document.getElementById(`c${i}`);
                const wrapper = document.getElementById(`w${i}`);
                cell.classList.add('spinning');
                wrapper.classList.add('blur-motion');
            }

            // Phase 2: Sustained Long Spin (4 seconds)
            setTimeout(() => {
                const results = [];
                for(let i=0; i<size*size; i++) results.push(syms[Math.floor(Math.random()*syms.length)]);

                // Phase 3: Staggered Mechanical Stop
                results.forEach((s, i) => {
                    setTimeout(() => {
                        const cell = document.getElementById(`c${i}`);
                        const wrapper = document.getElementById(`w${i}`);
                        
                        wrapper.classList.remove('blur-motion');
                        wrapper.innerHTML = icons[s];
                        
                        cell.classList.remove('spinning');
                        cell.classList.add('snap');
                        
                        setTimeout(() => cell.classList.remove('snap'), 400);

                        if(i === size*size - 1) calculateFinal(results);
                    }, i * 150); // Each cell stops 150ms after the previous one
                });

            }, 4000); // 4 seconds of peak spin velocity
        }

        function calculateFinal(results) {
            let win = 0, bonus = null;
            for(let r=0; r<size; r++) {
                let match = true, first = results[r*size];
                for(let c=1; c<size; c++) if(results[r*size + c] !== first) match = false;
                if(match) {
                    if(first === 'rainbow') bonus = 'rainbow';
                    else if(first === 'gold') bonus = 'gold';
                    win += bet * (syms.indexOf(first) + 5);
                }
            }
            balance += win;
            document.getElementById('win').innerText = win;
            document.getElementById('balance').innerText = balance;
            if(bonus) triggerBonus(bonus);
            else { document.getElementById('spin-btn').disabled = false; spinning = false; }
        }

        function triggerBonus(type) {
            const screen = document.getElementById('bonus-screen');
            screen.style.display = 'flex';
            screen.innerHTML = `<h1>${type === 'rainbow' ? '🌈 RAINBOW' : '💰 GOLD'} BONUS</h1><button onclick="endBonus(${type==='rainbow'?50:100})">CLAIM REWARD</button>`;
        }

        window.endBonus = (amt) => {
            balance += amt;
            document.getElementById('balance').innerText = balance;
            document.getElementById('bonus-screen').style.display = 'none';
            document.getElementById('spin-btn').disabled = false;
            spinning = false;
        };

        init();
    </script>
</body>
</html>
