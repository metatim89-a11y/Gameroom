<!DOCTYPE html>
<html>
<head>
    <title>Leprechaun Slots</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        .grid-container { display: grid; gap: 8px; background: #0f172a; padding: 15px; border-radius: 12px; border: 2px solid var(--accent); margin: auto; }
        .cell { background: #1e293b; border-radius: 6px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; padding: 5px; }
        .cell svg { width: 80%; height: 80%; }
        .stats { display: flex; justify-content: space-between; background: #1e293b; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; border: 1px solid var(--border); }
        .bonus-overlay { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container" style="position: relative;">
        <div id="bonus-screen" class="bonus-overlay"></div>
        <h1>Leprechaun Slots</h1>
        <div class="stats">
            <div>BANK: $<span id="balance">1000</span></div>
            <div>BET: $<span id="bet">10</span></div>
            <div style="color: var(--success)">WIN: $<span id="win">0</span></div>
        </div>
        
        <div style="display:flex; gap:20px; justify-content:center; margin-bottom: 15px;">
            <div>Size: <button onclick="resize(-1)">-</button> <span id="size-label">3x3</span> <button onclick="resize(1)">+</button></div>
            <div>Stake: <button onclick="adjustBet(-10)">-</button> <button onclick="adjustBet(10)">+</button></div>
        </div>

        <div class="game-box"><div id="grid" class="grid-container"></div></div>
        <div style="text-align:center"><button id="spin-btn" onclick="play()" style="width: 200px;">SPIN</button></div>
        <a href="../../index.html" class="back-link">← BACK</a>
    </div>

    <script>
        const icons = {
            clover: `<svg viewBox="0 0 24 24" fill="#22c55e"><path d="M12,10C12.7,10 13.2,9.5 13.2,8.8V4.2C13.2,3.5 12.7,3 12,3C11.3,3 10.8,3.5 10.8,4.2V8.8C10.8,9.5 11.3,10 12,10M17,11.2H21.8C22.5,11.2 23,10.7 23,10C23,9.3 22.5,8.8 21.8,8.8H17C16.3,8.8 15.8,9.3 15.8,10C15.8,10.7 16.3,11.2 17,11.2M7,11.2H2.2C1.5,11.2 1,10.7 1,10C1,9.3 1.5,8.8 2.2,8.8H7C7.7,8.8 8.2,9.3 8.2,10C8.2,10.7 7.7,11.2 7,11.2M12,14C11.3,14 10.8,14.5 10.8,15.2V19.8C10.8,20.5 11.3,21 12,21C12.7,21 13.2,20.5 13.2,19.8V15.2C13.2,14.5 12.7,14 12,14Z"/></svg>`,
            gold: `<svg viewBox="0 0 24 24" fill="#eab308"><path d="M5,6H19V18H5V6M19,4H5C3.89,4 3,4.89 3,6V18C3,19.11 3.89,20 5,20H19C20.11,20 21,19.11 21,18V6C21,4.89 20.11,4 19,4M12,15A3,3 0 0,1 9,12A3,3 0 0,1 12,9A3,3 0 0,1 15,12A3,3 0 0,1 12,15Z"/></svg>`,
            rainbow: `<svg viewBox="0 0 24 24" fill="#38bdf8"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4Z"/></svg>`,
            hat: `<svg viewBox="0 0 24 24" fill="#166534"><path d="M5,16L3,5L8.5,10L12,2L15.5,10L21,5L19,16H5M19,19C19,19.55 18.55,20 18,20H6C5.45,20 5,19.55 5,19V18H19V19Z"/></svg>`
        };
        const syms = ['clover', 'gold', 'rainbow', 'hat'];
        let balance = 1000, bet = 10, size = 3, spinning = false;

        function init() {
            const grid = document.getElementById('grid');
            grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            grid.innerHTML = '';
            for(let i=0; i<size*size; i++) grid.innerHTML += `<div class="cell" id="c${i}">${icons.clover}</div>`;
        }

        function resize(d) {
            if(spinning) return;
            size = Math.max(3, Math.min(6, size + d));
            document.getElementById('size-label').innerText = `${size}x${size}`;
            init();
        }

        function adjustBet(d) {
            if(spinning) return;
            bet = Math.max(10, Math.min(balance, bet + d));
            document.getElementById('bet').innerText = bet;
        }

        function play() {
            if(spinning || balance < bet) return;
            spinning = true; balance -= bet; document.getElementById('balance').innerText = balance;
            
            const results = [];
            for(let i=0; i<size*size; i++) {
                const s = syms[Math.floor(Math.random()*syms.length)];
                results.push(s);
                document.getElementById(`c${i}`).innerHTML = icons[s];
            }

            let win = 0, bonus = null;
            for(let r=0; r<size; r++) {
                let match = true, first = results[r*size];
                for(let c=1; c<size; c++) if(results[r*size + c] !== first) match = false;
                if(match) {
                    if(first === 'rainbow') bonus = 'rainbow';
                    else if(first === 'gold') bonus = 'gold';
                    win += bet * (syms.indexOf(first) + 5);
                }
            }

            balance += win;
            document.getElementById('win').innerText = win;
            document.getElementById('balance').innerText = balance;
            
            if(bonus) triggerBonus(bonus);
            else spinning = false;
        }

        function triggerBonus(type) {
            const screen = document.getElementById('bonus-screen');
            screen.style.display = 'flex';
            if(type === 'rainbow') {
                screen.innerHTML = `<h1>🌈 RAINBOW BONUS</h1><button onclick="endBonus(50)">COLLECT $50</button>`;
            } else {
                screen.innerHTML = `<h1>💰 GOLD POT</h1><button onclick="endBonus(100)">COLLECT $100</button>`;
            }
        }

        window.endBonus = (amt) => {
            balance += amt;
            document.getElementById('balance').innerText = balance;
            document.getElementById('bonus-screen').style.display = 'none';
            spinning = false;
        };

        init();
    </script>
</body>
</html>
