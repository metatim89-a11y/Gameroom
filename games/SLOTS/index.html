<!-- ./gameroom/games/SLOTS/index.html v11.0 - Ultra Mechanical -->
<!DOCTYPE html>
<html>
<head>
    <title>Quantum Slots | Digital Refinery</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        .grid-container { 
            display: grid; gap: 12px; background: rgba(0,0,0,0.5); padding: 20px; 
            border-radius: 24px; border: 2px solid var(--primary); margin: auto; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 20px var(--glow);
        }
        
        .cell { 
            background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 12px; aspect-ratio: 1; 
            display: flex; align-items: center; justify-content: center; padding: 10px;
            transition: transform 0.6s var(--transition-bounce), box-shadow 0.6s;
            position: relative; overflow: hidden; border: 1px solid var(--border);
        }

        .cell.spinning { 
            transform: scale(1.1) translateY(-5px); 
            box-shadow: 0 15px 30px var(--glow);
            border-color: var(--primary);
            z-index: 10;
        }

        .blur-motion { animation: mechSpin 0.1s infinite linear; }
        @keyframes mechSpin {
            0% { transform: translateY(-30px); filter: blur(10px) brightness(2); opacity: 0.6; }
            100% { transform: translateY(30px); filter: blur(10px) brightness(2); opacity: 0.6; }
        }

        .cell.snap { animation: snapSnap 0.4s var(--transition-bounce); }
        @keyframes snapSnap {
            0% { transform: scale(1.2) translateY(5px); }
            100% { transform: scale(1) translateY(0); }
        }

        .stats-display {
            display: flex; justify-content: space-around; background: var(--surface);
            padding: 20px; border-radius: 16px; margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.05); font-weight: 800;
        }
        
        .win-flash { animation: winFlash 0.5s infinite alternate; }
        @keyframes winFlash { from { filter: brightness(1); } to { filter: brightness(2); box-shadow: 0 0 30px var(--primary); } }
    </style>
</head>
<body id="game-body">
    <div class="container">
        <div id="bonus-screen" class="bonus-overlay"></div>
        <h1>QUANTUM SLOTS</h1>
        
        <div class="stats-display">
            <div>BANK: <span id="balance" style="color:var(--primary)">1000</span></div>
            <div>BET: <span id="bet" style="color:var(--tertiary)">10</span></div>
            <div>WIN: <span id="win" style="color:var(--secondary)">0</span></div>
        </div>
        
        <div style="display:flex; gap:15px; justify-content:center; margin-bottom: 25px;">
            <button onclick="resize(-1)" style="padding: 10px 20px;">- SIZE</button>
            <div class="glass" style="padding: 10px 25px; border-radius: 12px; font-weight: 900; display:flex; align-items:center;">
                <span id="size-label">3x3</span>
            </div>
            <button onclick="resize(1)" style="padding: 10px 20px;">+ SIZE</button>
        </div>

        <div class="game-box"><div id="grid" class="grid-container"></div></div>
        
        <div style="text-align:center; margin-top:30px; display:flex; gap:15px; justify-content:center;">
            <button onclick="adjustBet(-10)">DECREASE BET</button>
            <button id="spin-btn" onclick="play()" style="flex: 1; max-width: 400px; background: var(--primary); color: var(--bg-deep);">INITIATE SPIN SEQUENCE</button>
            <button onclick="adjustBet(10)">INCREASE BET</button>
        </div>
        
        <a href="../../index.html" class="back-link">TERMINATE INTERFACE</a>
    </div>

    <script>
        const icons = {
            clover: `<svg viewBox="0 0 24 24" fill="#22c55e"><path d="M12,10C12.7,10 13.2,9.5 13.2,8.8V4.2C13.2,3.5 12.7,3 12,3C11.3,3 10.8,3.5 10.8,4.2V8.8C10.8,9.5 11.3,10 12,10M17,11.2H21.8C22.5,11.2 23,10.7 23,10C23,9.3 22.5,8.8 21.8,8.8H17C16.3,8.8 15.8,9.3 15.8,10C15.8,10.7 16.3,11.2 17,11.2M7,11.2H2.2C1.5,11.2 1,10.7 1,10C1,9.3 1.5,8.8 2.2,8.8H7C7.7,8.8 8.2,9.3 8.2,10C8.2,10.7 7.7,11.2 7,11.2M12,14C11.3,14 10.8,14.5 10.8,15.2V19.8C10.8,20.5 11.3,21 12,21C12.7,21 13.2,20.5 13.2,19.8V15.2C13.2,14.5 12.7,14 12,14Z"/></svg>`,
            gold: `<svg viewBox="0 0 24 24" fill="#eab308"><path d="M5,6H19V18H5V6M19,4H5C3.89,4 3,4.89 3,6V18C3,19.11 3.89,20 5,20H19C20.11,20 21,19.11 21,18V6C21,4.89 20.11,4 19,4M12,15A3,3 0 0,1 9,12A3,3 0 0,1 12,9A3,3 0 0,1 15,12A3,3 0 0,1 12,15Z"/></svg>`,
            rainbow: `<svg viewBox="0 0 24 24" fill="#38bdf8"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4Z"/></svg>`,
            hat: `<svg viewBox="0 0 24 24" fill="#166534"><path d="M5,16L3,5L8.5,10L12,2L15.5,10L21,5L19,16H5M19,19C19,19.55 18.55,20 18,20H6C5.45,20 5,19.55 5,19V18H19V19Z"/></svg>`
        };
        const syms = ['clover', 'gold', 'rainbow', 'hat'];
        let balance = 1000, bet = 10, size = 3, spinning = false;

        function init() {
            const grid = document.getElementById('grid');
            grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            grid.innerHTML = '';
            for(let i=0; i<size*size; i++) {
                grid.innerHTML += `<div class="cell" id="c${i}"><div id="w${i}" style="width:100%;height:100%">${icons.clover}</div></div>`;
            }
        }

        function resize(d) {
            if(spinning) return;
            size = Math.max(3, Math.min(6, size + d));
            document.getElementById('size-label').innerText = `${size}x${size}`;
            init();
        }

        function adjustBet(d) {
            if(spinning) return;
            bet = Math.max(10, Math.min(balance, bet + d));
            document.getElementById('bet').innerText = bet;
        }

        function play() {
            if(spinning || balance < bet) return;
            spinning = true; balance -= bet; document.getElementById('balance').innerText = balance;
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;

            for(let i=0; i<size*size; i++) {
                document.getElementById(`c${i}`).classList.add('spinning');
                document.getElementById(`w${i}`).classList.add('blur-motion');
            }

            setTimeout(() => {
                const results = [];
                for(let i=0; i<size*size; i++) results.push(syms[Math.floor(Math.random()*syms.length)]);

                results.forEach((s, i) => {
                    setTimeout(() => {
                        const cell = document.getElementById(`c${i}`);
                        const wrapper = document.getElementById(`w${i}`);
                        wrapper.classList.remove('blur-motion');
                        wrapper.innerHTML = icons[s];
                        cell.classList.remove('spinning');
                        cell.classList.add('snap');
                        setTimeout(() => cell.classList.remove('snap'), 400);
                        if(i === size*size - 1) calculateFinal(results);
                    }, i * 120);
                });
            }, 3000);
        }

        function calculateFinal(results) {
            let win = 0, bonus = null;
            for(let r=0; r<size; r++) {
                let match = true, first = results[r*size];
                for(let c=1; c<size; c++) if(results[r*size + c] !== first) match = false;
                if(match) {
                    if(first === 'rainbow') bonus = 'rainbow';
                    else if(first === 'gold') bonus = 'gold';
                    win += bet * (syms.indexOf(first) + 5);
                }
            }
            balance += win;
            document.getElementById('win').innerText = win;
            document.getElementById('balance').innerText = balance;
            if(win > 0) document.getElementById('grid').classList.add('win-flash');
            setTimeout(() => document.getElementById('grid').classList.remove('win-flash'), 2000);

            if(bonus) triggerBonus(bonus);
            else { btn.disabled = false; spinning = false; }
        }

        function triggerBonus(type) {
            const screen = document.getElementById('bonus-screen');
            screen.style.display = 'flex';
            screen.innerHTML = `<h1 style="font-size:4rem">${type==='rainbow'?'🌈':'💰'}</h1><h2>${type.toUpperCase()} BONUS DETECTED</h2><button onclick="endBonus(${type==='rainbow'?50:100})">REALIZE ASSET</button>`;
        }

        window.endBonus = (amt) => {
            balance += amt;
            document.getElementById('balance').innerText = balance;
            document.getElementById('bonus-screen').style.display = 'none';
            document.getElementById('spin-btn').disabled = false;
            spinning = false;
        };

        window.onload = () => {
            const t = localStorage.getItem('refinery-theme');
            if(t) document.body.setAttribute('data-theme', t);
            init();
        }
    </script>
</body>
</html>
