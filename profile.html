<!-- ./gameroom/profile.html v1.0 -->
<!DOCTYPE html>
<html>
<head>
    <title>Profile | Digital Refinery</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: var(--bg-deep); }
        .profile-card { background: var(--surface); padding: 40px; border-radius: 20px; border: 1px solid var(--secondary); box-shadow: 0 0 20px rgba(112,0,255,0.2); width: 350px; text-align: center; }
        .profile-card h2 { color: var(--secondary); margin-top: 0; text-transform: uppercase; letter-spacing: 3px; }
        
        .avatar { width: 80px; height: 80px; background: var(--secondary); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; color: #000; }
        .stat-box { background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .stat-box label { display: block; color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-box span { font-size: 1.5rem; font-weight: 900; color: var(--gold, #ffd700); font-family: 'Space Mono', monospace; }
        
        .btn { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 12px; width: 100%; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: all 0.2s; margin-top: 10px; }
        .btn:hover { background: var(--danger); color: #fff; }
        .btn-hub { background: var(--secondary); color: #fff; border: none; border-color: var(--secondary); }
        .btn-hub:hover { filter: brightness(1.2); background: var(--secondary); }
        .btn-admin { display: none; background: transparent; border: 1px solid var(--primary); color: var(--primary); margin-bottom: 10px; }
        .btn-admin:hover { background: var(--primary); color: #000; }

    </style>
</head>
<body data-theme="cyber">
    <div class="profile-card">
        <div class="avatar" id="avatar">?</div>
        <h2 id="username-display">User</h2>
        
        <div class="stat-box">
            <label>Global Treasury Balance</label>
            <span id="balance-display">1000.00</span>
        </div>
        
        <button id="admin-btn" class="btn btn-admin" onclick="window.location.href='dev.html'">Dev Ops Panel</button>
        <button class="btn btn-hub" onclick="window.location.href='index.html'" style="margin-bottom: 10px;">Return to Hub</button>
        <button class="btn" onclick="logout()">Terminate Session</button>
    </div>
    <script>
        const user = localStorage.getItem('session_user');
        if(!user) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('username-display').innerText = user;
            document.getElementById('avatar').innerText = user.charAt(0).toUpperCase();
            
            // Just displaying a placeholder balance or pulling from a global generic balance if it exists.
            // Using Slots balance as global balance if it exists:
            // But we don't have a global one mapped, so we just show a static 1000.00 for now.
            
            if(user === 'Admin') {
                document.getElementById('admin-btn').style.display = 'block';
            }
        }
        
        function logout() {
            localStorage.removeItem('session_user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
